<!DOCTYPE html>
<html>
<head>
<title>10Chat — Friends</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: #c8d5e8; font-family: Arial, sans-serif; font-size: 13px; color: #000; }

    .global-nav { background: linear-gradient(180deg, #3a6aaa, #1a3a6b); border-bottom: 2px solid #0f2547; display: flex; align-items: stretch; height: 48px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
    .global-nav .brand { font-weight: bold; font-size: 20px; letter-spacing: 2px; color: #fff; padding: 0 22px; display: flex; align-items: center; border-right: 1px solid #4a7aaa; text-decoration: none; background: linear-gradient(180deg, #4a7aaa, #1a3a6b); }
    .nav-tabs { display: flex; align-items: stretch; }
    .nav-tab { display: flex; align-items: center; padding: 0 22px; color: #cce0ff; text-decoration: none; font-size: 13px; font-weight: bold; border-right: 1px solid #3a5580; position: relative; cursor: pointer; letter-spacing: 0.5px; transition: background 0.1s; }
    .nav-tab:hover { background: rgba(255,255,255,0.12); color: #fff; }
    .nav-tab.active { background: rgba(255,255,255,0.18); color: #fff; border-bottom: 3px solid #7eb3e8; }
    .notif-dot { width: 8px; height: 8px; background: #ff3b3b; border-radius: 50%; position: absolute; top: 8px; right: 9px; display: none; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.3); opacity: 0.7; } }
    .notif-dot.visible { display: block; }
    .nav-search { margin-left: auto; display: flex; align-items: center; gap: 6px; padding: 0 12px; position: relative; }
    .nav-search input { padding: 6px 12px; border: 1px solid #7599bc; background: #f0f5ff; font-family: Arial; font-size: 12px; width: 220px; color: #000; outline: none; border-radius: 2px; }
    .nav-search input:focus { border-color: #336699; background: #fff; }
    .nav-search button { background: linear-gradient(180deg, #7599bc, #4a77a8); color: #fff; border: 1px solid #336699; padding: 6px 14px; cursor: pointer; font-family: Arial; font-size: 12px; font-weight: bold; border-radius: 2px; }
    .signout-btn { display: flex; align-items: center; padding: 0 18px; background: linear-gradient(180deg, #c45050, #8b2020); color: #fff; font-size: 12px; font-weight: bold; cursor: pointer; border: none; border-left: 1px solid #0f2547; text-decoration: none; }
    .signout-btn:hover { background: linear-gradient(180deg, #a83333, #6e1515); }
    .search-dropdown { position: absolute; top: 48px; right: 60px; width: 240px; background: #fff; border: 1px solid #336699; z-index: 300; display: none; box-shadow: 2px 4px 12px rgba(0,0,0,0.25); }
    .search-dropdown-section { padding: 5px 10px 3px; font-size: 10px; color: #999; text-transform: uppercase; letter-spacing: 0.8px; background: #f5f8fd; border-bottom: 1px solid #dde5f0; }
    .search-result-item { padding: 8px 12px; border-bottom: 1px solid #edf2f8; cursor: pointer; color: #336699; font-weight: bold; font-size: 12px; display: flex; align-items: center; gap: 7px; }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: #eef2f8; }
    .search-no-result { padding: 8px 12px; color: #999; font-size: 12px; font-style: italic; }

    .page-wrapper { max-width: 1060px; margin: 16px auto; padding: 0 12px; }

    .page-title-bar {
        background: linear-gradient(180deg, #5d8ab0, #3a6699);
        color: #fff; font-weight: bold; font-size: 18px;
        padding: 10px 16px; border: 1px solid #336699; margin-bottom: 14px;
    }

    .tabs-row { display: flex; gap: 0; margin-bottom: 16px; border: 1px solid #336699; background: #fff; overflow: hidden; }
    .tab-btn { padding: 10px 24px; font-family: Arial; font-size: 13px; font-weight: bold; cursor: pointer; background: linear-gradient(180deg, #eef2f8, #dde5f0); border: none; border-right: 1px solid #c8d5e8; color: #336699; flex: 1; }
    .tab-btn:last-child { border-right: none; }
    .tab-btn.active { background: linear-gradient(180deg, #5d8ab0, #3a6699); color: #fff; }
    .tab-btn:hover:not(.active) { background: linear-gradient(180deg, #dde5f0, #ccd8eb); }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Friends grid */
    .friends-grid { display: flex; flex-wrap: wrap; gap: 16px; padding: 16px; }
    .friend-card {
        background: #fff;
        border: 1px solid #336699;
        width: 170px;
        text-align: center;
        padding: 16px 12px 12px;
        position: relative;
    }
    .friend-card.bff-card { border-color: #e8a020; border-width: 2px; }
    .bff-badge {
        position: absolute; top: 8px; right: 8px;
        background: #e8a020; color: #fff;
        font-size: 9px; font-weight: bold;
        padding: 2px 6px; border-radius: 8px;
        text-transform: uppercase; letter-spacing: 0.5px;
    }
    .friend-avatar-placeholder {
        width: 80px; height: 80px;
        background: linear-gradient(180deg, #7599bc, #4a77a8);
        border: 2px solid #336699;
        display: flex; align-items: center; justify-content: center;
        color: #fff; font-size: 32px; font-weight: bold;
        margin: 0 auto 10px;
    }
    .friend-avatar-img { width: 80px; height: 80px; object-fit: cover; border: 2px solid #336699; display: block; margin: 0 auto 10px; }
    .friend-name { font-weight: bold; font-size: 14px; color: #336699; text-decoration: none; display: block; margin-bottom: 3px; }
    .friend-name:hover { text-decoration: underline; }
    .friend-status { font-size: 11px; color: #888; font-style: italic; margin-bottom: 12px; min-height: 16px; }

    .friend-actions { display: flex; flex-direction: column; gap: 5px; }
    .action-btn {
        padding: 6px 10px;
        font-family: Arial; font-size: 11px; font-weight: bold;
        border: 1px solid; cursor: pointer; width: 100%;
        text-align: center; text-decoration: none; display: block;
    }
    .action-btn.message { background: linear-gradient(180deg, #7599bc, #4a77a8); color: #fff; border-color: #336699; }
    .action-btn.message:hover { background: linear-gradient(180deg, #5d86af, #2e5a88); }
    .action-btn.bff { background: linear-gradient(180deg, #f5c842, #e8a020); color: #fff; border-color: #c8820a; }
    .action-btn.bff:hover { background: linear-gradient(180deg, #e8b830, #cc8c10); }
    .action-btn.unbff { background: linear-gradient(180deg, #eef2f8, #dde5f0); color: #888; border-color: #bbb; }
    .action-btn.unbff:hover { background: #dde5f0; }
    .action-btn.remove { background: linear-gradient(180deg, #f5e8e8, #edd5d5); color: #a83333; border-color: #a83333; }
    .action-btn.remove:hover { background: #fdeaea; }

    /* Pending requests */
    .pending-box { background: #fff; border: 1px solid #336699; }
    .pending-box .box-header { background: linear-gradient(180deg, #5d8ab0, #3a6699); color: #fff; font-weight: bold; font-size: 12px; padding: 7px 14px; text-transform: uppercase; letter-spacing: 1px; }
    .pending-list { padding: 10px; }
    .pending-row { display: flex; align-items: center; gap: 14px; padding: 10px 12px; border-bottom: 1px solid #edf2f8; }
    .pending-row:last-child { border-bottom: none; }
    .pending-avatar { width: 46px; height: 46px; background: linear-gradient(180deg, #7599bc, #4a77a8); border: 1px solid #336699; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 18px; font-weight: bold; flex-shrink: 0; }
    .pending-name { font-weight: bold; color: #336699; font-size: 13px; text-decoration: none; flex: 1; }
    .pending-name:hover { text-decoration: underline; }
    .pending-btns { display: flex; gap: 7px; }
    .req-btn { padding: 6px 14px; font-size: 12px; font-family: Arial; font-weight: bold; border: 1px solid; cursor: pointer; }
    .req-btn.accept { background: linear-gradient(180deg, #77bc87, #3a9950); color: #fff; border-color: #2e7d3e; }
    .req-btn.decline { background: #eef2f8; color: #a83333; border-color: #a83333; }

    .empty-msg { padding: 28px; text-align: center; color: #999; font-style: italic; }
</style>
</head>
<body>

<div class="global-nav">
    <a href="/" class="brand">10Chat</a>
    <div class="nav-tabs">
        <a class="nav-tab" href="/">Home</a>
        <a class="nav-tab" href="/messages.html" id="nav-messages">Messages<span class="notif-dot" id="dot-messages"></span></a>
        <a class="nav-tab active" href="/friends.html">Friends<span class="notif-dot" id="dot-friends"></span></a>
        <a class="nav-tab" id="nav-account" href="#">Account</a>
    </div>
    <div class="nav-search">
        <input type="text" id="search-input" placeholder="Search for users..." autocomplete="off"
            oninput="liveSearch(this.value)"
            onkeydown="if(event.key==='Enter') doSearch()"
            onfocus="showSearchDropdown()" />
        <button onclick="doSearch()">Search</button>
        <div class="search-dropdown" id="search-dropdown"></div>
    </div>
    <a class="signout-btn" href="#" onclick="logOut()">Sign Out</a>
</div>

<div class="page-wrapper">
    <div class="page-title-bar">👥 My Friends</div>

    <div class="tabs-row">
        <button class="tab-btn active" onclick="switchTab('friends')">My Friends</button>
        <button class="tab-btn" onclick="switchTab('pending')" id="pending-tab-btn">Friend Requests</button>
    </div>

    <!-- Friends Tab -->
    <div class="tab-content active" id="tab-friends">
        <div id="friends-grid" class="friends-grid">
            <div class="empty-msg">Loading your friends...</div>
        </div>
    </div>

    <!-- Pending Tab -->
    <div class="tab-content" id="tab-pending">
        <div class="pending-box">
            <div class="box-header">Incoming Friend Requests</div>
            <div class="pending-list" id="pending-list">
                <div class="empty-msg">Loading...</div>
            </div>
        </div>
    </div>
</div>

<script>
const loggedInUser   = localStorage.getItem('username')
const loggedInUserId = localStorage.getItem('userId')

if (!loggedInUser) window.location.href = '/login.html'

document.getElementById('nav-account').href = '/profile/' + loggedInUser

function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'))
    document.getElementById('tab-' + tab).classList.add('active')
    event.target.classList.add('active')
    if (tab === 'pending') loadPending()
    else loadFriends()
}

// ── Friends ───────────────────────────────────
async function loadFriends() {
    const res  = await fetch('/api/friends/' + loggedInUserId)
    const data = await res.json()
    const grid = document.getElementById('friends-grid')

    if (!data.friends || data.friends.length === 0) {
        grid.innerHTML = '<div class="empty-msg">You have no friends yet. Search for people and add them!</div>'
        return
    }

    grid.innerHTML = ''
    data.friends.forEach(friend => {
        const initial    = friend.username.charAt(0).toUpperCase()
        const avatarHTML = friend.avatar_url
            ? `<img class="friend-avatar-img" src="${escHtml(friend.avatar_url)}" />`
            : `<div class="friend-avatar-placeholder">${initial}</div>`
        const isBff = friend.isBff

        const card = document.createElement('div')
        card.className = 'friend-card' + (isBff ? ' bff-card' : '')
        card.id = 'friend-card-' + friend.id
        card.innerHTML = `
            ${isBff ? '<div class="bff-badge">⭐ BFF</div>' : ''}
            ${avatarHTML}
            <a class="friend-name" href="/profile/${encodeURIComponent(friend.username)}">${escHtml(friend.username)}</a>
            <div class="friend-status">${escHtml(friend.status || '')}</div>
            <div class="friend-actions">
                <a class="action-btn message" href="/messages.html" onclick="openMsgWith('${escHtml(friend.username)}')">✉ Message</a>
                <button class="action-btn ${isBff ? 'unbff' : 'bff'}" onclick="toggleBff('${friend.requestId}', ${isBff}, '${friend.id}')">
                    ${isBff ? '★ Remove BFF' : '⭐ Make BFF'}
                </button>
                <button class="action-btn remove" onclick="removeFriend('${friend.requestId}', '${friend.username}')">✕ Remove Friend</button>
            </div>`
        grid.appendChild(card)
    })
}

function openMsgWith(username) {
    localStorage.setItem('openMsgWith', username)
}

async function toggleBff(requestId, currentlyBff, friendId) {
    const newBff = !currentlyBff
    const res = await fetch('/api/friends/bff', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ requestId, userId: loggedInUserId, isBff: newBff })
    })
    const data = await res.json()
    if (data.error) return alert(data.error)
    loadFriends()
}

async function removeFriend(requestId, username) {
    if (!confirm(`Remove ${username} as a friend?`)) return
    const res = await fetch('/api/friends/remove', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ requestId, userId: loggedInUserId })
    })
    const data = await res.json()
    if (data.error) return alert(data.error)
    loadFriends()
}

// ── Pending requests ──────────────────────────
async function loadPending() {
    const res  = await fetch('/api/friends/pending/' + loggedInUserId)
    const data = await res.json()
    const list = document.getElementById('pending-list')

    if (!data.pending || data.pending.length === 0) {
        list.innerHTML = '<div class="empty-msg">No pending friend requests.</div>'
        return
    }

    // Update tab badge
    document.getElementById('dot-friends').classList.add('visible')

    list.innerHTML = ''
    data.pending.forEach(req => {
        const initial = req.username.charAt(0).toUpperCase()
        const row = document.createElement('div')
        row.className = 'pending-row'
        row.id = 'pending-row-' + req.requestId
        row.innerHTML = `
            <div class="pending-avatar">${initial}</div>
            <a class="pending-name" href="/profile/${encodeURIComponent(req.username)}">${escHtml(req.username)}</a>
            <div class="pending-btns">
                <button class="req-btn accept" onclick="acceptRequest('${req.requestId}')">Accept</button>
                <button class="req-btn decline" onclick="declineRequest('${req.requestId}')">Decline</button>
            </div>`
        list.appendChild(row)
    })
}

async function acceptRequest(requestId) {
    const res = await fetch('/api/friends/accept', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ requestId, userId: loggedInUserId })
    })
    const data = await res.json()
    if (data.error) return alert(data.error)
    const row = document.getElementById('pending-row-' + requestId)
    if (row) row.remove()
    if (!document.getElementById('pending-list').querySelector('.pending-row')) {
        document.getElementById('pending-list').innerHTML = '<div class="empty-msg">No pending friend requests.</div>'
    }
    loadFriends()
}

async function declineRequest(requestId) {
    await fetch('/api/friends/remove', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ requestId, userId: loggedInUserId })
    })
    const row = document.getElementById('pending-row-' + requestId)
    if (row) row.remove()
    if (!document.getElementById('pending-list').querySelector('.pending-row')) {
        document.getElementById('pending-list').innerHTML = '<div class="empty-msg">No pending friend requests.</div>'
    }
}

// ── Search ────────────────────────────────────
let searchTimeout = null
const RECENT_SEARCHES_KEY = '10chat_recent_searches'

function getRecentSearches() {
    try { return JSON.parse(localStorage.getItem(RECENT_SEARCHES_KEY)) || [] } catch { return [] }
}
function addRecentSearch(username) {
    let recent = getRecentSearches().filter(u => u.toLowerCase() !== username.toLowerCase())
    recent.unshift(username)
    recent = recent.slice(0, 5)
    localStorage.setItem(RECENT_SEARCHES_KEY, JSON.stringify(recent))
}
function showSearchDropdown() {
    if (!document.getElementById('search-input').value.trim()) showRecentSearches()
}
function showRecentSearches() {
    const recent = getRecentSearches()
    const dropdown = document.getElementById('search-dropdown')
    if (recent.length === 0) { dropdown.style.display = 'none'; return }
    dropdown.innerHTML = `<div class="search-dropdown-section">Recently Searched</div>`
    recent.forEach(username => {
        const item = document.createElement('div')
        item.className = 'search-result-item'
        item.innerHTML = `<span>🕐</span> ${escHtml(username)}`
        item.onclick = () => { window.location.href = '/profile/' + encodeURIComponent(username) }
        dropdown.appendChild(item)
    })
    dropdown.style.display = 'block'
}
async function liveSearch(query) {
    const dropdown = document.getElementById('search-dropdown')
    clearTimeout(searchTimeout)
    if (!query.trim()) { showRecentSearches(); return }
    searchTimeout = setTimeout(async () => {
        const res  = await fetch('/api/users/search?q=' + encodeURIComponent(query))
        const data = await res.json()
        dropdown.innerHTML = ''
        if (!data.users || data.users.length === 0) {
            dropdown.innerHTML = `<div class="search-no-result">No users found</div>`
        } else {
            data.users.forEach(user => {
                const item = document.createElement('div')
                item.className = 'search-result-item'
                item.innerHTML = `<span>👤</span> ${escHtml(user.username)}`
                item.onclick = () => {
                    addRecentSearch(user.username)
                    window.location.href = '/profile/' + encodeURIComponent(user.username)
                }
                dropdown.appendChild(item)
            })
        }
        dropdown.style.display = 'block'
    }, 200)
}
async function doSearch() {
    const query = document.getElementById('search-input').value.trim()
    if (!query) return
    const res  = await fetch('/api/users/search?q=' + encodeURIComponent(query))
    const data = await res.json()
    if (data.users && data.users.length > 0) {
        addRecentSearch(data.users[0].username)
        window.location.href = '/profile/' + encodeURIComponent(data.users[0].username)
    }
}
document.addEventListener('click', (e) => {
    if (!e.target.closest('.nav-search')) document.getElementById('search-dropdown').style.display = 'none'
})

async function logOut() {
    await fetch('/api/logout', { method: 'POST' })
    localStorage.removeItem('token')
    localStorage.removeItem('username')
    localStorage.removeItem('userId')
    window.location.href = '/login.html'
}

function escHtml(str) {
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;')
}

// Check for pending requests on load
async function checkPending() {
    const res  = await fetch('/api/friends/pending/' + loggedInUserId)
    const data = await res.json()
    if (data.pending && data.pending.length > 0) {
        document.getElementById('dot-friends').classList.add('visible')
        document.getElementById('pending-tab-btn').innerText = `Friend Requests (${data.pending.length})`
    }
}

loadFriends()
checkPending()
</script>
</body>
</html>
