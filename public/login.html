<!DOCTYPE html>
<html>
<head>
<title>10Chat — Log In</title>
<style>
    body {
        background-color: #d0d9e8;
        font-family: Arial, sans-serif;
        font-size: 12px;
        color: #000;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
    }

    .box {
        background: #ffffff;
        border: 1px solid #336699;
        width: 320px;
    }

    .box-header {
        background: linear-gradient(180deg, #7599bc, #4a77a8);
        color: #ffffff;
        font-weight: bold;
        padding: 6px 10px;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .box-body {
        padding: 16px;
    }

    input {
        width: 100%;
        padding: 5px;
        margin-bottom: 10px;
        border: 1px solid #336699;
        font-family: Arial;
        font-size: 12px;
        box-sizing: border-box;
    }

    button {
        background: #4a77a8;
        color: #fff;
        border: none;
        padding: 6px 16px;
        cursor: pointer;
        font-family: Arial;
        font-size: 12px;
        width: 100%;
    }

    button:hover {
        background: #336699;
    }

    .error {
        color: #cc0000;
        margin-bottom: 10px;
        display: none;
    }

    .link {
        text-align: center;
        margin-top: 10px;
        color: #336699;
    }

    .link a {
        color: #336699;
    }
</style>
</head>
<body>

<div class="box">
    <div class="box-header">Log In to 10Chat</div>
    <div class="box-body">
        <div class="error" id="error-msg"></div>
        <input type="text" id="username" placeholder="Username" />
        <input type="password" id="password" placeholder="Password" />
        <button onclick="logIn()">Log In</button>
        <div class="link">Don't have an account? <a href="/signup.html">Sign up</a></div>
    </div>
</div>

<script>
async function logIn() {
    const username = document.getElementById('username').value.trim()
    const password = document.getElementById('password').value

    const errorEl = document.getElementById('error-msg')
    errorEl.style.display = 'none'

    if (!username || !password) {
        errorEl.innerText = 'Please enter your username and password.'
        errorEl.style.display = 'block'
        return
    }

    const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
    })

    const data = await res.json()

    if (data.error) {
        errorEl.innerText = data.error
        errorEl.style.display = 'block'
    } else {
        // Save the session token in localStorage so we stay logged in
        localStorage.setItem('token', data.token)
        localStorage.setItem('username', data.username)
        localStorage.setItem('userId', data.userId)
        window.location.href = '/'
    }
}
</script>

</body>
</html>
