<!DOCTYPE html>
<html>
<head>
<title>10Chat — Messages</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        background-color: #d0d9e8;
        font-family: Arial, sans-serif;
        font-size: 12px;
        color: #000;
    }

    .global-nav {
        background: linear-gradient(180deg, #2a548a, #1a3a6b);
        border-bottom: 2px solid #0f2547;
        display: flex;
        align-items: stretch;
        height: 36px;
        position: sticky;
        top: 0;
        z-index: 100;
        box-shadow: 0 2px 6px rgba(0,0,0,0.4);
    }

    .global-nav .brand {
        font-weight: bold;
        font-size: 15px;
        letter-spacing: 2px;
        color: #fff;
        padding: 0 16px;
        display: flex;
        align-items: center;
        border-right: 1px solid #3a6aaa;
        text-decoration: none;
        background: linear-gradient(180deg, #3a6aaa, #1a3a6b);
    }

    .nav-tabs { display: flex; align-items: stretch; }

    .nav-tab {
        display: flex;
        align-items: center;
        padding: 0 16px;
        color: #cce0ff;
        text-decoration: none;
        font-size: 12px;
        font-weight: bold;
        border-right: 1px solid #3a5580;
        position: relative;
        cursor: pointer;
        letter-spacing: 0.5px;
    }

    .nav-tab:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .nav-tab.active { background: rgba(255,255,255,0.15); color: #fff; border-bottom: 2px solid #7eb3e8; }

    .notif-dot {
        width: 7px; height: 7px;
        background: #ff3b3b;
        border-radius: 50%;
        position: absolute;
        top: 7px; right: 8px;
        display: none;
        animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.3); opacity: 0.7; }
    }

    .notif-dot.visible { display: block; }

    .nav-search {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 0 10px;
        position: relative;
    }

    .nav-search input {
        padding: 4px 8px;
        border: 1px solid #7599bc;
        background: #eef4ff;
        font-family: Arial;
        font-size: 11px;
        width: 180px;
        outline: none;
    }

    .nav-search button {
        background: linear-gradient(180deg, #7599bc, #4a77a8);
        color: #fff;
        border: 1px solid #336699;
        padding: 4px 10px;
        cursor: pointer;
        font-family: Arial;
        font-size: 11px;
        font-weight: bold;
    }

    .signout-btn {
        display: flex;
        align-items: center;
        padding: 0 14px;
        background: linear-gradient(180deg, #c45050, #8b2020);
        color: #fff;
        font-size: 11px;
        font-weight: bold;
        cursor: pointer;
        border: none;
        border-left: 1px solid #0f2547;
        text-decoration: none;
    }

    .signout-btn:hover { background: linear-gradient(180deg, #a83333, #6e1515); }

    .search-results {
        position: absolute;
        top: 36px; right: 60px;
        width: 200px;
        background: #fff;
        border: 1px solid #336699;
        z-index: 200;
        display: none;
        box-shadow: 2px 2px 6px rgba(0,0,0,0.2);
    }

    .search-result-item {
        padding: 6px 10px;
        border-bottom: 1px solid #dde5f0;
        cursor: pointer;
        color: #336699;
        font-weight: bold;
        font-size: 12px;
    }

    .search-result-item:hover { background: #eef2f8; }

    /* ── Messages layout ── */
    .page-wrapper {
        max-width: 960px;
        margin: 10px auto;
        padding: 0 8px;
        display: flex;
        gap: 8px;
        height: calc(100vh - 56px);
    }

    /* Left — conversations list */
    .conversations-col {
        width: 240px;
        flex-shrink: 0;
        background: #fff;
        border: 1px solid #336699;
        display: flex;
        flex-direction: column;
    }

    .col-header {
        background: linear-gradient(180deg, #7599bc, #4a77a8);
        color: #fff;
        font-weight: bold;
        font-size: 11px;
        padding: 6px 10px;
        text-transform: uppercase;
        letter-spacing: 1px;
        flex-shrink: 0;
    }

    .conversations-list {
        flex: 1;
        overflow-y: auto;
    }

    .convo-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 10px;
        border-bottom: 1px solid #dde5f0;
        cursor: pointer;
    }

    .convo-item:hover { background: #eef2f8; }
    .convo-item.active { background: #dde8f5; }

    .convo-avatar {
        width: 36px;
        height: 36px;
        background: linear-gradient(180deg, #7599bc, #4a77a8);
        border: 1px solid #336699;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-weight: bold;
        font-size: 14px;
        flex-shrink: 0;
    }

    .convo-info { flex: 1; min-width: 0; }

    .convo-name {
        font-weight: bold;
        color: #336699;
        font-size: 12px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .convo-preview {
        font-size: 10px;
        color: #999;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .convo-unread {
        background: #cc0000;
        color: #fff;
        font-size: 9px;
        font-weight: bold;
        padding: 1px 5px;
        border-radius: 8px;
        display: none;
    }

    .convo-unread.visible { display: inline-block; }

    .new-message-btn {
        padding: 8px;
        border-top: 1px solid #dde5f0;
        flex-shrink: 0;
    }

    .new-message-btn input {
        width: 100%;
        padding: 4px 8px;
        border: 1px solid #7599bc;
        font-family: Arial;
        font-size: 11px;
        outline: none;
        margin-bottom: 4px;
    }

    .new-message-btn button {
        width: 100%;
        background: linear-gradient(180deg, #7599bc, #4a77a8);
        color: #fff;
        border: 1px solid #336699;
        padding: 4px;
        cursor: pointer;
        font-family: Arial;
        font-size: 11px;
        font-weight: bold;
    }

    /* Right — chat window */
    .chat-col {
        flex: 1;
        background: #fff;
        border: 1px solid #336699;
        display: flex;
        flex-direction: column;
    }

    .chat-header {
        background: linear-gradient(180deg, #7599bc, #4a77a8);
        color: #fff;
        font-weight: bold;
        font-size: 12px;
        padding: 6px 10px;
        flex-shrink: 0;
    }

    .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 10px;
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .chat-empty {
        color: #999;
        font-style: italic;
        text-align: center;
        margin-top: 20px;
        font-size: 12px;
    }

    .message-bubble {
        max-width: 70%;
        padding: 6px 10px;
        font-size: 12px;
        line-height: 1.5;
        position: relative;
    }

    .message-bubble.mine {
        background: #dde8f5;
        border: 1px solid #7599bc;
        align-self: flex-end;
        text-align: right;
    }

    .message-bubble.theirs {
        background: #f5f5f5;
        border: 1px solid #ddd;
        align-self: flex-start;
    }

    .bubble-time {
        font-size: 9px;
        color: #999;
        margin-top: 3px;
    }

    .chat-input-row {
        display: flex;
        gap: 6px;
        padding: 8px;
        border-top: 1px solid #dde5f0;
        flex-shrink: 0;
    }

    .chat-input-row input {
        flex: 1;
        padding: 6px 10px;
        border: 1px solid #7599bc;
        font-family: Arial;
        font-size: 12px;
        outline: none;
    }

    .chat-input-row input:focus { border-color: #336699; }

    .chat-input-row button {
        background: linear-gradient(180deg, #7599bc, #4a77a8);
        color: #fff;
        border: 1px solid #336699;
        padding: 6px 16px;
        cursor: pointer;
        font-family: Arial;
        font-size: 12px;
        font-weight: bold;
    }

    .chat-input-row button:hover { background: linear-gradient(180deg, #5d86af, #2e5a88); }

    .typing-indicator {
        font-size: 10px;
        color: #999;
        font-style: italic;
        padding: 0 10px 4px;
        min-height: 16px;
        flex-shrink: 0;
    }

    .no-chat-selected {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #999;
        font-style: italic;
    }
</style>
</head>
<body>

<div class="global-nav">
    <a href="/" class="brand">10Chat</a>
    <div class="nav-tabs">
        <a class="nav-tab" href="/">Home</a>
        <a class="nav-tab active" href="/messages.html">
            Messages
            <span class="notif-dot" id="dot-messages"></span>
        </a>
        <a class="nav-tab" href="#" id="nav-friends-tab">
            Friends
            <span class="notif-dot" id="dot-friends"></span>
        </a>
        <a class="nav-tab" id="nav-account" href="#">Account</a>
    </div>
    <div class="nav-search">
        <input type="text" id="search-input" placeholder="Search for users..." onkeydown="if(event.key==='Enter') doSearch()" />
        <button onclick="doSearch()">Search</button>
        <div class="search-results" id="search-results"></div>
    </div>
    <a class="signout-btn" href="#" onclick="logOut()">Sign Out</a>
</div>

<div class="page-wrapper">

    <!-- LEFT — Conversations -->
    <div class="conversations-col">
        <div class="col-header">Messages</div>
        <div class="conversations-list" id="conversations-list">
            <div style="padding:10px; color:#999; font-style:italic;">Loading...</div>
        </div>
        <div class="new-message-btn">
            <input type="text" id="new-message-username" placeholder="Message a friend..." onkeydown="if(event.key==='Enter') startNewConversation()" />
            <button onclick="startNewConversation()">New Message</button>
        </div>
    </div>

    <!-- RIGHT — Chat window -->
    <div class="chat-col" id="chat-col">
        <div class="chat-header" id="chat-header">Select a conversation</div>
        <div class="no-chat-selected" id="no-chat-selected">
            Select a conversation or start a new one
        </div>
        <div class="chat-messages" id="chat-messages" style="display:none;"></div>
        <div class="typing-indicator" id="typing-indicator" style="display:none;"></div>
        <div class="chat-input-row" id="chat-input-row" style="display:none;">
            <input type="text" id="chat-input" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMessage()" />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const loggedInUser   = localStorage.getItem('username')
const loggedInUserId = localStorage.getItem('userId')

if (!loggedInUser) window.location.href = '/login.html'

document.getElementById('nav-account').href = '/profile/' + loggedInUser

let socket = null
let activeConvoUserId   = null
let activeConvoUsername = null
let typingTimer         = null

// ── Connect Socket.io ──────────────────────
socket = io()
socket.emit('register', loggedInUserId)

socket.on('new_message', (msg) => {
    if (activeConvoUserId === msg.sender_id) {
        appendMessage(msg, false)
        socket.emit('mark_read', { userId: loggedInUserId, otherUserId: msg.sender_id })
    } else {
        // Show dot on messages tab
        document.getElementById('dot-messages').classList.add('visible')
    }
    loadConversations()
})

socket.on('message_sent', (msg) => {
    appendMessage(msg, true)
})

// ── Load conversations ─────────────────────
async function loadConversations() {
    const res  = await fetch('/api/messages/inbox/' + loggedInUserId)
    const data = await res.json()
    const list = document.getElementById('conversations-list')

    if (!data.conversations || data.conversations.length === 0) {
        list.innerHTML = '<div style="padding:10px; color:#999; font-style:italic;">No messages yet.</div>'
        return
    }

    list.innerHTML = ''
    data.conversations.forEach(convo => {
        const initial  = convo.username.charAt(0).toUpperCase()
        const isActive = convo.otherId === activeConvoUserId
        const preview  = convo.lastMessage.body.length > 30
            ? convo.lastMessage.body.substring(0, 30) + '...'
            : convo.lastMessage.body

        const div = document.createElement('div')
        div.className = 'convo-item' + (isActive ? ' active' : '')
        div.onclick   = () => openConversation(convo.otherId, convo.username)
        div.innerHTML = `
            <div class="convo-avatar">${initial}</div>
            <div class="convo-info">
                <div class="convo-name">${escHtml(convo.username)}</div>
                <div class="convo-preview">${escHtml(preview)}</div>
            </div>
        `
        list.appendChild(div)
    })
}

// ── Open a conversation ────────────────────
async function openConversation(userId, username) {
    activeConvoUserId   = userId
    activeConvoUsername = username

    document.getElementById('chat-header').innerText        = username
    document.getElementById('no-chat-selected').style.display = 'none'
    document.getElementById('chat-messages').style.display  = 'flex'
    document.getElementById('chat-input-row').style.display = 'flex'
    document.getElementById('typing-indicator').style.display = 'block'

    // Mark as active in list
    loadConversations()

    // Load message history
    const res  = await fetch(`/api/messages/${loggedInUserId}/${userId}`)
    const data = await res.json()
    const box  = document.getElementById('chat-messages')
    box.innerHTML = ''

    if (!data.messages || data.messages.length === 0) {
        box.innerHTML = '<div class="chat-empty">No messages yet. Say hello!</div>'
    } else {
        data.messages.forEach(msg => {
            appendMessage(msg, msg.sender_id === loggedInUserId)
        })
    }

    // Mark as read
    socket.emit('mark_read', { userId: loggedInUserId, otherUserId: userId })
    scrollToBottom()
}

// ── Append a message bubble ────────────────
function appendMessage(msg, isMine) {
    const box  = document.getElementById('chat-messages')
    const empty = box.querySelector('.chat-empty')
    if (empty) empty.remove()

    const div  = document.createElement('div')
    div.className = 'message-bubble ' + (isMine ? 'mine' : 'theirs')
    div.innerHTML = `
        <div>${escHtml(msg.body)}</div>
        <div class="bubble-time">${new Date(msg.created_at).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })}</div>
    `
    box.appendChild(div)
    scrollToBottom()
}

function scrollToBottom() {
    const box = document.getElementById('chat-messages')
    box.scrollTop = box.scrollHeight
}

// ── Send a message ─────────────────────────
function sendMessage() {
    const input = document.getElementById('chat-input')
    const body  = input.value.trim()
    if (!body || !activeConvoUserId) return

    socket.emit('send_message', {
        senderId:   loggedInUserId,
        receiverId: activeConvoUserId,
        body
    })

    input.value = ''
}

// ── Start new conversation ─────────────────
async function startNewConversation() {
    const username = document.getElementById('new-message-username').value.trim()
    if (!username) return

    const res = await fetch('/api/profile/' + encodeURIComponent(username))
    if (!res.ok) return alert('User not found.')

    const data = await res.json()
    document.getElementById('new-message-username').value = ''
    openConversation(data.profile.id, data.profile.username)
    loadConversations()
}

// ── Search ────────────────────────────────
async function doSearch() {
    const query      = document.getElementById('search-input').value.trim()
    const resultsBox = document.getElementById('search-results')
    if (!query) return

    const res = await fetch('/api/profile/' + encodeURIComponent(query))
    if (res.ok) {
        const data = await res.json()
        resultsBox.style.display = 'block'
        resultsBox.innerHTML = `
            <div class="search-result-item" onclick="window.location='/profile/${encodeURIComponent(data.profile.username)}'">
                👤 ${escHtml(data.profile.username)}
            </div>`
    } else {
        resultsBox.style.display = 'block'
        resultsBox.innerHTML = `<div class="search-result-item" style="color:#999;font-weight:normal;">No user found.</div>`
    }
}

// ── Auth ──────────────────────────────────
async function logOut() {
    await fetch('/api/logout', { method: 'POST' })
    localStorage.removeItem('token')
    localStorage.removeItem('username')
    localStorage.removeItem('userId')
    window.location.href = '/login.html'
}

// ── Utils ─────────────────────────────────
function escHtml(str) {
    return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
}

// ── Init ──────────────────────────────────
loadConversations()

// Wire up Messages nav tab
document.getElementById('nav-friends-tab').href = '/profile/' + loggedInUser
</script>

</body>
</html>
