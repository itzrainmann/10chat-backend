<!DOCTYPE html>
<html>
<head>
<title>10Chat — Messages</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: #c8d5e8; font-family: Arial, sans-serif; font-size: 13px; color: #000; }

    .global-nav { background: linear-gradient(180deg, #3a6aaa, #1a3a6b); border-bottom: 2px solid #0f2547; display: flex; align-items: stretch; height: 44px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
    .global-nav .brand { font-weight: bold; font-size: 18px; letter-spacing: 2px; color: #fff; padding: 0 20px; display: flex; align-items: center; border-right: 1px solid #4a7aaa; text-decoration: none; background: linear-gradient(180deg, #4a7aaa, #1a3a6b); }
    .nav-tabs { display: flex; align-items: stretch; }
    .nav-tab { display: flex; align-items: center; padding: 0 20px; color: #cce0ff; text-decoration: none; font-size: 13px; font-weight: bold; border-right: 1px solid #3a5580; position: relative; cursor: pointer; letter-spacing: 0.5px; transition: background 0.1s; }
    .nav-tab:hover { background: rgba(255,255,255,0.12); color: #fff; }
    .nav-tab.active { background: rgba(255,255,255,0.18); color: #fff; border-bottom: 3px solid #7eb3e8; }
    .notif-dot { width: 8px; height: 8px; background: #ff3b3b; border-radius: 50%; position: absolute; top: 8px; right: 9px; display: none; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.3); opacity: 0.7; } }
    .notif-dot.visible { display: block; }
    .nav-search { margin-left: auto; display: flex; align-items: center; gap: 6px; padding: 0 12px; position: relative; }
    .nav-search input { padding: 5px 10px; border: 1px solid #7599bc; background: #f0f5ff; font-family: Arial; font-size: 12px; width: 200px; color: #000; outline: none; border-radius: 2px; }
    .nav-search input:focus { border-color: #336699; background: #fff; }
    .nav-search button { background: linear-gradient(180deg, #7599bc, #4a77a8); color: #fff; border: 1px solid #336699; padding: 5px 12px; cursor: pointer; font-family: Arial; font-size: 12px; font-weight: bold; border-radius: 2px; }
    .signout-btn { display: flex; align-items: center; padding: 0 16px; background: linear-gradient(180deg, #c45050, #8b2020); color: #fff; font-size: 12px; font-weight: bold; cursor: pointer; border: none; border-left: 1px solid #0f2547; text-decoration: none; }
    .signout-btn:hover { background: linear-gradient(180deg, #a83333, #6e1515); }
    .search-results { position: absolute; top: 44px; right: 60px; width: 220px; background: #fff; border: 1px solid #336699; z-index: 200; display: none; box-shadow: 2px 2px 8px rgba(0,0,0,0.2); }
    .search-result-item { padding: 7px 12px; border-bottom: 1px solid #dde5f0; cursor: pointer; color: #336699; font-weight: bold; font-size: 12px; }
    .search-result-item:hover { background: #eef2f8; }

    .page-wrapper { max-width: 1000px; margin: 12px auto; padding: 0 10px; display: flex; gap: 10px; height: calc(100vh - 68px); }

    .conversations-col { width: 260px; flex-shrink: 0; background: #fff; border: 1px solid #336699; display: flex; flex-direction: column; }
    .col-header { background: linear-gradient(180deg, #5d8ab0, #3a6699); color: #fff; font-weight: bold; font-size: 12px; padding: 7px 12px; text-transform: uppercase; letter-spacing: 1px; flex-shrink: 0; }
    .conversations-list { flex: 1; overflow-y: auto; }

    .convo-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-bottom: 1px solid #dde5f0; cursor: pointer; }
    .convo-item:hover { background: #eef2f8; }
    .convo-item.active { background: #dde8f5; }
    .convo-avatar { width: 40px; height: 40px; background: linear-gradient(180deg, #7599bc, #4a77a8); border: 1px solid #336699; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; font-size: 16px; flex-shrink: 0; }
    .convo-info { flex: 1; min-width: 0; }
    .convo-name { font-weight: bold; color: #336699; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .convo-preview { font-size: 11px; color: #999; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }

    .new-message-btn { padding: 10px; border-top: 1px solid #dde5f0; flex-shrink: 0; }
    .new-message-btn input { width: 100%; padding: 6px 10px; border: 1px solid #7599bc; font-family: Arial; font-size: 12px; outline: none; margin-bottom: 6px; }
    .new-message-btn input:focus { border-color: #336699; }
    .new-message-btn button { width: 100%; background: linear-gradient(180deg, #7599bc, #4a77a8); color: #fff; border: 1px solid #336699; padding: 6px; cursor: pointer; font-family: Arial; font-size: 12px; font-weight: bold; }

    .chat-col { flex: 1; background: #fff; border: 1px solid #336699; display: flex; flex-direction: column; }
    .chat-header { background: linear-gradient(180deg, #5d8ab0, #3a6699); color: #fff; font-weight: bold; font-size: 13px; padding: 7px 12px; flex-shrink: 0; }

    .chat-messages { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }

    .no-chat-selected { flex: 1; display: flex; align-items: center; justify-content: center; color: #999; font-style: italic; font-size: 14px; }
    .chat-empty { color: #999; font-style: italic; text-align: center; margin-top: 24px; font-size: 13px; }

    .message-bubble { max-width: 70%; padding: 8px 12px; font-size: 13px; line-height: 1.5; }
    .message-bubble.mine { background: #dde8f5; border: 1px solid #7599bc; align-self: flex-end; text-align: right; }
    .message-bubble.theirs { background: #f5f5f5; border: 1px solid #ddd; align-self: flex-start; }
    .bubble-time { font-size: 10px; color: #999; margin-top: 4px; }

    .typing-indicator { font-size: 11px; color: #999; font-style: italic; padding: 0 12px 5px; min-height: 18px; flex-shrink: 0; }

    .chat-input-row { display: flex; gap: 8px; padding: 10px; border-top: 1px solid #dde5f0; flex-shrink: 0; }
    .chat-input-row input { flex: 1; padding: 7px 12px; border: 1px solid #7599bc; font-family: Arial; font-size: 13px; outline: none; }
    .chat-input-row input:focus { border-color: #336699; }
    .chat-input-row button { background: linear-gradient(180deg, #7599bc, #4a77a8); color: #fff; border: 1px solid #336699; padding: 7px 20px; cursor: pointer; font-family: Arial; font-size: 13px; font-weight: bold; }
    .chat-input-row button:hover { background: linear-gradient(180deg, #5d86af, #2e5a88); }
</style>
</head>
<body>

<div class="global-nav">
    <a href="/" class="brand">10Chat</a>
    <div class="nav-tabs">
        <a class="nav-tab" href="/">Home</a>
        <a class="nav-tab active" href="/messages.html">Messages<span class="notif-dot" id="dot-messages"></span></a>
        <a class="nav-tab" href="#" id="nav-friends-tab">Friends<span class="notif-dot" id="dot-friends"></span></a>
        <a class="nav-tab" id="nav-account" href="#">Account</a>
    </div>
    <div class="nav-search">
        <input type="text" id="search-input" placeholder="Search for users..." onkeydown="if(event.key==='Enter') doSearch()" />
        <button onclick="doSearch()">Search</button>
        <div class="search-results" id="search-results"></div>
    </div>
    <a class="signout-btn" href="#" onclick="logOut()">Sign Out</a>
</div>

<div class="page-wrapper">

    <div class="conversations-col">
        <div class="col-header">Messages</div>
        <div class="conversations-list" id="conversations-list">
            <div style="padding:12px; color:#999; font-style:italic;">Loading...</div>
        </div>
        <div class="new-message-btn">
            <input type="text" id="new-message-username" placeholder="Message a user by username..." onkeydown="if(event.key==='Enter') startNewConversation()" />
            <button onclick="startNewConversation()">New Message</button>
        </div>
    </div>

    <div class="chat-col">
        <div class="chat-header" id="chat-header">Select a conversation</div>
        <div class="no-chat-selected" id="no-chat-selected">Select a conversation or start a new one</div>
        <div class="chat-messages" id="chat-messages" style="display:none;"></div>
        <div class="typing-indicator" id="typing-indicator" style="display:none;"></div>
        <div class="chat-input-row" id="chat-input-row" style="display:none;">
            <input type="text" id="chat-input" placeholder="Type a message..." onkeydown="if(event.key==='Enter') sendMessage()" oninput="onTyping()" />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const loggedInUser   = localStorage.getItem('username')
const loggedInUserId = localStorage.getItem('userId')

if (!loggedInUser) window.location.href = '/login.html'

document.getElementById('nav-account').href     = '/profile/' + loggedInUser
document.getElementById('nav-friends-tab').href = '/profile/' + loggedInUser

let socket = io()
socket.emit('register', loggedInUserId)

let activeConvoUserId   = null
let activeConvoUsername = null
let typingTimer         = null

socket.on('new_message', (msg) => {
    if (activeConvoUserId === msg.sender_id) {
        appendMessage(msg, false)
        socket.emit('mark_read', { userId: loggedInUserId, otherUserId: msg.sender_id })
    } else {
        document.getElementById('dot-messages').classList.add('visible')
    }
    loadConversations()
})

socket.on('message_sent', (msg) => {
    appendMessage(msg, true)
})

socket.on('user_typing', ({ senderId }) => {
    if (senderId === activeConvoUserId) {
        document.getElementById('typing-indicator').innerText = activeConvoUsername + ' is typing...'
    }
})

socket.on('user_stop_typing', ({ senderId }) => {
    if (senderId === activeConvoUserId) {
        document.getElementById('typing-indicator').innerText = ''
    }
})

function onTyping() {
    if (!activeConvoUserId) return
    socket.emit('typing', { senderId: loggedInUserId, receiverId: activeConvoUserId })
    clearTimeout(typingTimer)
    typingTimer = setTimeout(() => {
        socket.emit('stop_typing', { senderId: loggedInUserId, receiverId: activeConvoUserId })
    }, 1500)
}

async function loadConversations() {
    const res  = await fetch('/api/messages/inbox/' + loggedInUserId)
    const data = await res.json()
    const list = document.getElementById('conversations-list')

    if (!data.conversations || data.conversations.length === 0) {
        list.innerHTML = '<div style="padding:12px; color:#999; font-style:italic;">No messages yet.</div>'
        return
    }

    list.innerHTML = ''
    data.conversations.forEach(convo => {
        const initial  = convo.username.charAt(0).toUpperCase()
        const isActive = convo.otherId === activeConvoUserId
        const preview  = convo.lastMessage.body.length > 35 ? convo.lastMessage.body.substring(0, 35) + '...' : convo.lastMessage.body

        const div = document.createElement('div')
        div.className = 'convo-item' + (isActive ? ' active' : '')
        div.onclick   = () => openConversation(convo.otherId, convo.username)
        div.innerHTML = `
            <div class="convo-avatar">${initial}</div>
            <div class="convo-info">
                <div class="convo-name">${escHtml(convo.username)}</div>
                <div class="convo-preview">${escHtml(preview)}</div>
            </div>`
        list.appendChild(div)
    })
}

async function openConversation(userId, username) {
    activeConvoUserId   = userId
    activeConvoUsername = username

    document.getElementById('chat-header').innerText            = username
    document.getElementById('no-chat-selected').style.display  = 'none'
    document.getElementById('chat-messages').style.display     = 'flex'
    document.getElementById('chat-input-row').style.display    = 'flex'
    document.getElementById('typing-indicator').style.display  = 'block'

    loadConversations()

    const res  = await fetch(`/api/messages/${loggedInUserId}/${userId}`)
    const data = await res.json()
    const box  = document.getElementById('chat-messages')
    box.innerHTML = ''

    if (!data.messages || data.messages.length === 0) {
        box.innerHTML = '<div class="chat-empty">No messages yet. Say hello!</div>'
    } else {
        data.messages.forEach(msg => appendMessage(msg, msg.sender_id === loggedInUserId))
    }

    socket.emit('mark_read', { userId: loggedInUserId, otherUserId: userId })
    scrollToBottom()
}

function appendMessage(msg, isMine) {
    const box   = document.getElementById('chat-messages')
    const empty = box.querySelector('.chat-empty')
    if (empty) empty.remove()

    const div = document.createElement('div')
    div.className = 'message-bubble ' + (isMine ? 'mine' : 'theirs')
    div.innerHTML = `
        <div>${escHtml(msg.body)}</div>
        <div class="bubble-time">${new Date(msg.created_at).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })}</div>`
    box.appendChild(div)
    scrollToBottom()
}

function scrollToBottom() {
    const box = document.getElementById('chat-messages')
    box.scrollTop = box.scrollHeight
}

function sendMessage() {
    const input = document.getElementById('chat-input')
    const body  = input.value.trim()
    if (!body || !activeConvoUserId) return
    socket.emit('send_message', { senderId: loggedInUserId, receiverId: activeConvoUserId, body })
    socket.emit('stop_typing', { senderId: loggedInUserId, receiverId: activeConvoUserId })
    input.value = ''
}

async function startNewConversation() {
    const username = document.getElementById('new-message-username').value.trim()
    if (!username) return
    const res = await fetch('/api/profile/' + encodeURIComponent(username))
    if (!res.ok) return alert('User not found.')
    const data = await res.json()
    document.getElementById('new-message-username').value = ''
    openConversation(data.profile.id, data.profile.username)
    loadConversations()
}

async function doSearch() {
    const query      = document.getElementById('search-input').value.trim()
    const resultsBox = document.getElementById('search-results')
    if (!query) return
    const res = await fetch('/api/profile/' + encodeURIComponent(query))
    if (res.ok) {
        const data = await res.json()
        resultsBox.style.display = 'block'
        resultsBox.innerHTML = `<div class="search-result-item" onclick="window.location='/profile/${encodeURIComponent(data.profile.username)}'">👤 ${escHtml(data.profile.username)}</div>`
    } else {
        resultsBox.style.display = 'block'
        resultsBox.innerHTML = `<div class="search-result-item" style="color:#999;font-weight:normal;">No user found.</div>`
    }
}

async function logOut() {
    await fetch('/api/logout', { method: 'POST' })
    localStorage.removeItem('token')
    localStorage.removeItem('username')
    localStorage.removeItem('userId')
    window.location.href = '/login.html'
}

function escHtml(str) {
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;')
}

loadConversations()
</script>
</body>
</html>
