<!DOCTYPE html>
<html>
<head>
<title>10Chat — Admin Tools</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: #c8d5e8; font-family: Arial, sans-serif; font-size: 13px; color: #000; }

    .global-nav { background: linear-gradient(180deg, #3a6aaa, #1a3a6b); border-bottom: 2px solid #0f2547; display: flex; align-items: stretch; height: 48px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
    .global-nav .brand { font-weight: bold; font-size: 20px; letter-spacing: 2px; color: #fff; padding: 0 22px; display: flex; align-items: center; border-right: 1px solid #4a7aaa; text-decoration: none; background: linear-gradient(180deg, #4a7aaa, #1a3a6b); }
    .nav-tabs { display: flex; align-items: stretch; }
    .nav-tab { display: flex; align-items: center; padding: 0 22px; color: #cce0ff; text-decoration: none; font-size: 13px; font-weight: bold; border-right: 1px solid #3a5580; cursor: pointer; letter-spacing: 0.5px; transition: background 0.1s; }
    .nav-tab:hover { background: rgba(255,255,255,0.12); color: #fff; }
    .signout-btn { display: flex; align-items: center; padding: 0 18px; background: linear-gradient(180deg, #c45050, #8b2020); color: #fff; font-size: 12px; font-weight: bold; cursor: pointer; border: none; border-left: 1px solid #0f2547; text-decoration: none; margin-left: auto; }
    .signout-btn:hover { background: linear-gradient(180deg, #a83333, #6e1515); }

    .page-wrapper { max-width: 1100px; margin: 16px auto; padding: 0 12px; }

    .admin-header {
        background: linear-gradient(180deg, #4a2060, #2a0f40);
        color: #fff; font-weight: bold; font-size: 20px;
        padding: 12px 18px; border: 1px solid #7a30a8; margin-bottom: 16px;
        display: flex; align-items: center; gap: 12px;
    }

    .admin-header .admin-badge {
        background: #ff3b3b; color: #fff;
        font-size: 10px; padding: 2px 8px;
        border-radius: 10px; font-weight: bold; letter-spacing: 1px;
    }

    .tabs-row { display: flex; gap: 0; margin-bottom: 16px; border: 1px solid #336699; background: #fff; overflow: hidden; }
    .tab-btn { padding: 10px 28px; font-family: Arial; font-size: 13px; font-weight: bold; cursor: pointer; background: linear-gradient(180deg, #eef2f8, #dde5f0); border: none; border-right: 1px solid #c8d5e8; color: #336699; flex: 1; }
    .tab-btn:last-child { border-right: none; }
    .tab-btn.active { background: linear-gradient(180deg, #4a2060, #2a0f40); color: #fff; }
    .tab-btn:hover:not(.active) { background: linear-gradient(180deg, #dde5f0, #ccd8eb); }

    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .section-box { background: #fff; border: 1px solid #336699; margin-bottom: 14px; }
    .section-box .box-header { background: linear-gradient(180deg, #5d8ab0, #3a6699); color: #fff; font-weight: bold; font-size: 12px; padding: 8px 14px; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; justify-content: space-between; }
    .count-badge { background: rgba(255,255,255,0.3); color: #fff; font-size: 11px; padding: 1px 8px; border-radius: 8px; }

    /* Admin items */
    .admin-item { border-bottom: 1px solid #edf2f8; padding: 12px 16px; display: flex; align-items: flex-start; gap: 14px; }
    .admin-item:last-child { border-bottom: none; }
    .admin-item:hover { background: #fafbfd; }

    .admin-item-body { flex: 1; min-width: 0; }
    .admin-item-meta { font-size: 11px; color: #999; margin-bottom: 4px; }
    .admin-item-meta .author { font-weight: bold; color: #336699; text-decoration: none; }
    .admin-item-meta .author:hover { text-decoration: underline; }
    .admin-item-title { font-weight: bold; font-size: 14px; color: #222; margin-bottom: 4px; }
    .admin-item-text { color: #444; font-size: 13px; line-height: 1.5; max-height: 60px; overflow: hidden; text-overflow: ellipsis; }
    .admin-item-sub { font-size: 11px; color: #aaa; margin-top: 4px; font-style: italic; }

    .delete-btn {
        background: linear-gradient(180deg, #c97070, #a83333);
        color: #fff; border: 1px solid #7d2e2e;
        padding: 6px 14px; cursor: pointer;
        font-family: Arial; font-size: 12px; font-weight: bold;
        flex-shrink: 0; align-self: center;
        white-space: nowrap;
    }
    .delete-btn:hover { background: linear-gradient(180deg, #a83333, #7d1515); }

    /* Users */
    .user-row { border-bottom: 1px solid #edf2f8; padding: 10px 16px; display: flex; align-items: center; gap: 14px; }
    .user-row:last-child { border-bottom: none; }
    .user-row:hover { background: #fafbfd; }
    .user-avatar { width: 40px; height: 40px; background: linear-gradient(180deg, #7599bc, #4a77a8); border: 1px solid #336699; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: bold; font-size: 16px; flex-shrink: 0; }
    .user-info { flex: 1; }
    .user-name { font-weight: bold; color: #336699; font-size: 13px; text-decoration: none; }
    .user-name:hover { text-decoration: underline; }
    .user-meta { font-size: 11px; color: #999; margin-top: 2px; }
    .user-bio { font-size: 12px; color: #666; margin-top: 3px; }
    .user-view-btn { background: linear-gradient(180deg, #eef2f8, #dde5f0); color: #336699; border: 1px solid #7599bc; padding: 5px 12px; cursor: pointer; font-family: Arial; font-size: 12px; font-weight: bold; text-decoration: none; }
    .user-view-btn:hover { background: #dde5f0; }

    .stats-row { display: flex; gap: 14px; margin-bottom: 16px; flex-wrap: wrap; }
    .stat-box { background: #fff; border: 1px solid #336699; padding: 16px 20px; flex: 1; min-width: 140px; text-align: center; }
    .stat-num { font-size: 28px; font-weight: bold; color: #336699; }
    .stat-label { font-size: 12px; color: #888; margin-top: 4px; }

    .empty-msg { padding: 28px; text-align: center; color: #999; font-style: italic; }
    .loading-msg { padding: 18px; text-align: center; color: #999; }

    #access-denied { padding: 40px; text-align: center; color: #a83333; font-size: 16px; font-weight: bold; display: none; }
</style>
</head>
<body>

<div class="global-nav">
    <a href="/" class="brand">10Chat</a>
    <div class="nav-tabs">
        <a class="nav-tab" href="/">Home</a>
        <a class="nav-tab" href="/messages.html">Messages</a>
        <a class="nav-tab" href="/friends.html">Friends</a>
        <a class="nav-tab" id="nav-account" href="#">Account</a>
    </div>
    <a class="signout-btn" href="#" onclick="logOut()">Sign Out</a>
</div>

<div class="page-wrapper">

    <div id="access-denied">
        🚫 Access Denied — Admin only.
    </div>

    <div id="admin-panel" style="display:none;">

        <div class="admin-header">
            🛡️ Admin Tools
            <span class="admin-badge">ADMIN</span>
        </div>

        <div class="stats-row" id="stats-row">
            <div class="stat-box"><div class="stat-num" id="stat-posts">—</div><div class="stat-label">Total Posts</div></div>
            <div class="stat-box"><div class="stat-num" id="stat-comments">—</div><div class="stat-label">Total Comments</div></div>
            <div class="stat-box"><div class="stat-num" id="stat-users">—</div><div class="stat-label">Total Users</div></div>
        </div>

        <div class="tabs-row">
            <button class="tab-btn active" onclick="switchTab('posts', this)">📝 Posts</button>
            <button class="tab-btn" onclick="switchTab('comments', this)">💬 Comments</button>
            <button class="tab-btn" onclick="switchTab('users', this)">👤 Users</button>
        </div>

        <!-- Posts Tab -->
        <div class="tab-content active" id="tab-posts">
            <div class="section-box">
                <div class="box-header">
                    All Posts
                    <span class="count-badge" id="posts-count-badge">Loading...</span>
                </div>
                <div id="posts-list"><div class="loading-msg">Loading posts...</div></div>
            </div>
        </div>

        <!-- Comments Tab -->
        <div class="tab-content" id="tab-comments">
            <div class="section-box">
                <div class="box-header">
                    All Comments
                    <span class="count-badge" id="comments-count-badge">Loading...</span>
                </div>
                <div id="comments-list"><div class="loading-msg">Loading comments...</div></div>
            </div>
        </div>

        <!-- Users Tab -->
        <div class="tab-content" id="tab-users">
            <div class="section-box">
                <div class="box-header">
                    All Users
                    <span class="count-badge" id="users-count-badge">Loading...</span>
                </div>
                <div id="users-list"><div class="loading-msg">Loading users...</div></div>
            </div>
        </div>

    </div>
</div>

<script>
const loggedInUser   = localStorage.getItem('username')
const loggedInUserId = localStorage.getItem('userId')
const ADMIN_USERNAME = 'torin' // Change to your username

if (!loggedInUser) window.location.href = '/login.html'

document.getElementById('nav-account').href = '/profile/' + loggedInUser

// Check admin access
if (!loggedInUser || loggedInUser.toLowerCase() !== ADMIN_USERNAME.toLowerCase()) {
    document.getElementById('access-denied').style.display = 'block'
} else {
    document.getElementById('admin-panel').style.display = 'block'
    loadAll()
}

function switchTab(tab, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'))
    document.getElementById('tab-' + tab).classList.add('active')
    btn.classList.add('active')
}

async function loadAll() {
    loadPosts()
    loadComments()
    loadUsers()
}

// ── Posts ─────────────────────────────────────
async function loadPosts() {
    const res  = await fetch('/api/admin/posts?userId=' + loggedInUserId)
    const data = await res.json()
    const list = document.getElementById('posts-list')

    if (data.error) { list.innerHTML = `<div class="empty-msg">${escHtml(data.error)}</div>`; return }
    if (!data.posts || data.posts.length === 0) { list.innerHTML = '<div class="empty-msg">No posts yet.</div>'; return }

    document.getElementById('posts-count-badge').innerText = data.posts.length + ' posts'
    document.getElementById('stat-posts').innerText = data.posts.length

    list.innerHTML = ''
    data.posts.forEach(post => {
        const item = document.createElement('div')
        item.className = 'admin-item'
        item.id = 'post-item-' + post.id
        item.innerHTML = `
            <div class="admin-item-body">
                <div class="admin-item-meta">
                    <a class="author" href="/profile/${encodeURIComponent(post.username)}">${escHtml(post.username)}</a>
                    &nbsp;·&nbsp; ${new Date(post.created_at).toLocaleDateString('en-GB')} ${new Date(post.created_at).toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'})}
                    &nbsp;·&nbsp; ❤ ${post.likes || 0} likes
                </div>
                <div class="admin-item-title">${escHtml(post.title || '(no title)')}</div>
                <div class="admin-item-text">${escHtml(post.body || '')}</div>
            </div>
            <button class="delete-btn" onclick="deletePost('${post.id}')">🗑 Delete</button>`
        list.appendChild(item)
    })
}

async function deletePost(postId) {
    if (!confirm('Delete this post and all its comments?')) return
    const res = await fetch('/api/admin/posts/' + postId, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: loggedInUserId })
    })
    const data = await res.json()
    if (data.error) return alert(data.error)
    const item = document.getElementById('post-item-' + postId)
    if (item) item.remove()
    // Refresh counts
    loadAll()
}

// ── Comments ──────────────────────────────────
async function loadComments() {
    const res  = await fetch('/api/admin/comments?userId=' + loggedInUserId)
    const data = await res.json()
    const list = document.getElementById('comments-list')

    if (data.error) { list.innerHTML = `<div class="empty-msg">${escHtml(data.error)}</div>`; return }
    if (!data.comments || data.comments.length === 0) { list.innerHTML = '<div class="empty-msg">No comments yet.</div>'; return }

    document.getElementById('comments-count-badge').innerText = data.comments.length + ' comments'
    document.getElementById('stat-comments').innerText = data.comments.length

    list.innerHTML = ''
    data.comments.forEach(comment => {
        const item = document.createElement('div')
        item.className = 'admin-item'
        item.id = 'comment-item-' + comment.id
        item.innerHTML = `
            <div class="admin-item-body">
                <div class="admin-item-meta">
                    <a class="author" href="/profile/${encodeURIComponent(comment.username)}">${escHtml(comment.username)}</a>
                    &nbsp;·&nbsp; ${new Date(comment.created_at).toLocaleDateString('en-GB')} ${new Date(comment.created_at).toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit'})}
                    &nbsp;·&nbsp; ❤ ${comment.likes || 0} likes
                </div>
                <div class="admin-item-text">${escHtml(comment.body || '')}</div>
                <div class="admin-item-sub">On post: "${escHtml(comment.postTitle)}"</div>
            </div>
            <button class="delete-btn" onclick="deleteComment('${comment.id}')">🗑 Delete</button>`
        list.appendChild(item)
    })
}

async function deleteComment(commentId) {
    if (!confirm('Delete this comment?')) return
    const res = await fetch('/api/admin/comments/' + commentId, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId: loggedInUserId })
    })
    const data = await res.json()
    if (data.error) return alert(data.error)
    const item = document.getElementById('comment-item-' + commentId)
    if (item) item.remove()
    loadComments()
}

// ── Users ─────────────────────────────────────
async function loadUsers() {
    const res  = await fetch('/api/admin/users?userId=' + loggedInUserId)
    const data = await res.json()
    const list = document.getElementById('users-list')

    if (data.error) { list.innerHTML = `<div class="empty-msg">${escHtml(data.error)}</div>`; return }
    if (!data.users || data.users.length === 0) { list.innerHTML = '<div class="empty-msg">No users.</div>'; return }

    document.getElementById('users-count-badge').innerText = data.users.length + ' users'
    document.getElementById('stat-users').innerText = data.users.length

    list.innerHTML = ''
    data.users.forEach(user => {
        const initial = user.username.charAt(0).toUpperCase()
        const row = document.createElement('div')
        row.className = 'user-row'
        row.innerHTML = `
            <div class="user-avatar">${initial}</div>
            <div class="user-info">
                <a class="user-name" href="/profile/${encodeURIComponent(user.username)}">${escHtml(user.username)}</a>
                <div class="user-meta">Joined ${new Date(user.created_at).toLocaleDateString('en-GB')}</div>
                ${user.bio ? `<div class="user-bio">${escHtml(user.bio)}</div>` : ''}
            </div>
            <a class="user-view-btn" href="/profile/${encodeURIComponent(user.username)}">View Profile</a>`
        list.appendChild(row)
    })
}

async function logOut() {
    await fetch('/api/logout', { method: 'POST' })
    localStorage.removeItem('token')
    localStorage.removeItem('username')
    localStorage.removeItem('userId')
    window.location.href = '/login.html'
}

function escHtml(str) {
    return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;')
}
</script>
</body>
</html>
